<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.site_title }} - GHOST Access</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f0ff;
            --dark-blue: #0a0a1a;
            --card-bg: rgba(10, 20, 40, 0.85);
            --border-glow: 0 0 15px var(--neon-blue), 0 0 45px rgba(0,240,255,0.4);
            --text-glow: 0 0 8px var(--neon-blue);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--dark-blue);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }
        
        canvas#matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .login-card {
            position: relative;
            z-index: 2;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--border-glow);
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .ghost-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            letter-spacing: 6px;
            color: var(--neon-blue);
            text-shadow: var(--text-glow), 0 0 30px var(--neon-blue);
            animation: glitch 3s infinite;
        }
        
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(-1px, -2px); }
            80% { transform: translate(1px, 1px); }
        }
        
        .subtitle {
            text-align: center;
            margin-bottom: 2rem;
            color: #88ccff;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 1.8rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 50px 14px 18px;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            box-shadow: 0 0 20px var(--neon-blue);
            border-color: #fff;
        }
        
        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-blue);
            cursor: pointer;
            font-size: 1.4rem;
            transition: 0.2s;
            z-index: 1;
        }
        .toggle-btn:hover {
            text-shadow: var(--text-glow);
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 3px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .login-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
            transform: scale(1.02);
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        
        .error-msg {
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff5555;
            color: #ff5555;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 500;
        }
        
        .footer-text {
            text-align: center;
            margin-top: 2rem;
            color: #5577aa;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="matrix-bg">
        <canvas id="matrixCanvas"></canvas>
    </div>
    
    <div class="login-card">
        <div class="ghost-logo">GHOST</div>
        <div class="subtitle">SECURE TERMINAL v3.1</div>
        
        {% if error %}
        <div class="error-msg">
            <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/login" id="loginForm">
            <div class="input-group">
                <input type="password" name="password" id="password" placeholder="Enter Access Password" required autofocus>
                <i class="fas fa-eye toggle-btn" id="toggleIcon" onclick="togglePassword()"></i>
            </div>
            <button type="submit" class="login-btn" onclick="playClickSound()">
                <i class="fas fa-skull"></i> AUTHENTICATE
            </button>
        </form>
        
        <div class="footer-text">
            ⚡ GHOST SECURE SYSTEMS ⚡<br>
            UNAUTHORIZED ACCESS PROHIBITED
        </div>
    </div>

    <script>
        // Matrix Rain Canvas
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ01'.split('');
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(10,10,26,0.1)';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#00f0ff';
            ctx.font = fontSize + 'px monospace';
            for(let i=0;i<drops.length;i++){
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*fontSize, drops[i]*fontSize);
                if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
                    drops[i]=0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
        
        window.addEventListener('resize',()=>{
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if(pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye','fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash','fa-eye');
            }
        }
        
        // Click sound using Web Audio API
        function playClickSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 800;
                oscillator.type = 'square';
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch(e) { /* ignore */ }
        }
    </script>
</body>
</html>
